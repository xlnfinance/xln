name: build-and-test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: build-and-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  contracts-test:
    name: Contracts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock', '**/package.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install

      - name: Install contracts dependencies
        run: |
          cd jurisdictions
          bun install

      - name: Build contracts
        run: bun run env:build

      - name: Run full contract tests
        run: cd jurisdictions && bun run test

  build-xln:
    name: Runtime Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock', '**/package.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install

      - name: Run runtime source checks
        run: bun run check:src

      - name: Build TypeScript
        run: bun run build

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache frontend dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            frontend/node_modules
          key: ${{ runner.os }}-frontend-bun-${{ hashFiles('frontend/bun.lock', 'frontend/package.json') }}
          restore-keys: |
            ${{ runner.os }}-frontend-bun-

      - name: Install frontend dependencies
        run: |
          cd frontend
          bun install

      - name: Check frontend
        run: |
          cd frontend
          bun run check

      - name: Build frontend
        run: |
          cd frontend
          bun run build:static

      # - name: Upload frontend build artifacts
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: frontend-build
      #     path: frontend/build/
      #     retention-days: 1

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [build-xln, frontend-build, contracts-test]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock', '**/package.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install

      - name: Install frontend dependencies
        run: |
          cd frontend
          bun install

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-chromium-${{ hashFiles('**/package.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-chromium-

      - name: Install Playwright browsers
        run: bunx playwright install chromium --with-deps

      - name: Cache contract artifacts
        uses: actions/cache@v4
        with:
          path: |
            jurisdictions/artifacts
            jurisdictions/cache
          key: ${{ runner.os }}-contracts-${{ hashFiles('jurisdictions/**/*.sol', 'jurisdictions/hardhat.config.*') }}
          restore-keys: |
            ${{ runner.os }}-contracts-

      - name: Build contracts for E2E
        run: |
          bun run env:build
          ./scripts/sync-contract-artifacts.sh
          # Clear any existing deployment cache to avoid reconciliation issues in CI
          rm -rf jurisdictions/ignition/deployments/chain-* || true

      - name: Run isolated quick suite
        run: bun run test
        env:
          CI: true

      - name: Print logs on failure
        if: failure()
        run: |
          find .logs -maxdepth 4 -type f -name '*.log' -print 2>/dev/null | head -20 | while read -r log; do
            echo "=== $log (last 120 lines) ==="
            tail -n 120 "$log" || true
          done

      - name: Upload E2E test results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: e2e-test-results
          path: |
            .logs/
            test-results/
            playwright-report/
          retention-days: 7
