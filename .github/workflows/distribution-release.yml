name: Distribution release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with: { bun-version: 1.3.14 }
      - name: Install source-check tooling
        run: sudo apt-get update && sudo apt-get install --yes ripgrep
      - run: bun install --frozen-lockfile
      - run: bun install --frozen-lockfile
        working-directory: frontend
      - run: bun run check

  mac-launcher-desktop-chrome:
    needs: validate
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with: { bun-version: 1.3.14 }
      - run: bun install --frozen-lockfile
      - run: bun install --frozen-lockfile
        working-directory: frontend
      - run: bun run release:launcher:verify
      - run: bun scripts/native/build-platforms.ts desktop extension --package --smoke --no-build
      - uses: actions/upload-artifact@v4
        with:
          name: distribution-macos
          path: |
            packages/npm/xlnfinance/*.tgz
            native/dist/desktop/*.zip
            native/dist/chrome/*.zip
          if-no-files-found: error

  android:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with: { bun-version: 1.3.14 }
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: android-actions/setup-android@v3
      - run: bun install --frozen-lockfile
      - run: bun install --frozen-lockfile
        working-directory: frontend
      - run: bun run build
      - run: bun run build
        working-directory: frontend
      - run: bun scripts/native/build-platforms.ts android --package --no-build
      - uses: actions/upload-artifact@v4
        with:
          name: distribution-android
          path: native/dist/android/*.apk
          if-no-files-found: error

  publish-github:
    needs: [mac-launcher-desktop-chrome, android]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with: { bun-version: 1.3.14 }
      - uses: actions/download-artifact@v4
        with:
          pattern: distribution-*
          path: native/dist/release-assets
          merge-multiple: true
      - run: bun run release:manifest
      - name: Attest release assets
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            native/dist/release-assets/*
            native/dist/release-manifest.json
            native/dist/SHA256SUMS
      - name: Create immutable GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "${GITHUB_REF_NAME}"
          native/dist/release-assets/*
          native/dist/release-manifest.json
          native/dist/SHA256SUMS
          --repo "${GITHUB_REPOSITORY}"
          --verify-tag
          --generate-notes
