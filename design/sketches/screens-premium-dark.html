<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>xln — screens · premium dark</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<style>:root{--font-sans:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;--font-serif:Georgia,serif}
body{margin:0;background:#e6e8eb;display:flex;justify-content:center;padding:28px 16px;font-family:var(--font-sans)}
.stage{width:100%;max-width:720px}
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
.dk{font-family:'Inter',var(--font-sans);color:#ECEDEF}
.dk .num{font-variant-numeric:tabular-nums}
.dk-mut{color:#8A8F98}
.dk-row{display:flex;justify-content:space-between;align-items:center}
.dk-btn{height:48px;display:flex;align-items:center;justify-content:center;border-radius:12px;background:#6E7CFF;color:#fff;font-size:15px;font-weight:500;cursor:pointer}
.dk-fld{background:#1F232B;border:1px solid rgba(255,255,255,.06);border-radius:14px;padding:15px 16px}
.dk-pill{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:999px;padding:5px 12px 5px 6px}
</style>
</head><body><div class="stage">

<div id="screens-dark" style="background:#E7E9ED;border-radius:20px;padding:20px">
<div class="dk" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(282px,1fr));gap:16px">

  <div style="background:#16181D;border:1px solid rgba(255,255,255,.08);border-radius:18px;padding:20px">
    <div class="dk-row" style="margin-bottom:18px">
      <span style="font-size:15px;font-weight:500">Send</span>
      <span class="dk-mut" style="font-size:12px;display:flex;align-items:center;gap:5px"><i class="ti ti-shield-check" style="font-size:14px;color:#34D399" aria-hidden="true"></i>provable</span>
    </div>

    <div class="dk-row" style="margin-bottom:20px">
      <div style="display:flex;align-items:center;gap:11px">
        <span style="width:38px;height:38px;border-radius:50%;background:rgba(110,124,255,.18);color:#9AA4FF;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:500">G</span>
        <div><div style="font-size:15px;font-weight:500;line-height:1.2">grace</div><div class="dk-mut num" style="font-size:12px">0x9f3c…1118</div></div>
      </div>
      <i class="ti ti-chevron-right dk-mut" style="font-size:18px" aria-hidden="true"></i>
    </div>

    <div style="text-align:center;margin:6px 0 22px">
      <div class="num" style="font-size:48px;font-weight:600;letter-spacing:-.03em;line-height:1;color:#fff">$250.00</div>
      <div class="dk-mut" style="font-size:13px;margin-top:9px;display:inline-flex;align-items:center;gap:4px">USDC <i class="ti ti-chevron-down" style="font-size:14px" aria-hidden="true"></i></div>
    </div>

    <div style="border-top:1px solid rgba(255,255,255,.08);padding-top:14px">
      <div class="dk-row" style="margin-bottom:9px"><span class="dk-mut" style="font-size:13px">Amount</span><span class="num" style="font-size:14px">$250.00</span></div>
      <div class="dk-row" style="margin-bottom:9px"><span class="dk-mut" style="font-size:13px">Network fee</span><span style="font-size:14px;color:#34D399;font-weight:500">Free</span></div>
      <div class="dk-row"><span class="dk-mut" style="font-size:13px">Arrives</span><span style="font-size:14px;color:#34D399;font-weight:500">Instantly</span></div>
    </div>

    <div style="margin:16px 0 18px">
      <div class="dk-row" style="margin-bottom:7px"><span class="dk-mut" style="font-size:12px">Backed by credit</span><span class="dk-mut num" style="font-size:12px">4,880 available</span></div>
      <div style="height:5px;border-radius:3px;background:rgba(110,124,255,.18);overflow:hidden"><div style="width:38%;height:100%;background:#6E7CFF"></div></div>
    </div>

    <div class="dk-btn" role="button" aria-label="Send 250 dollars">Send $250.00</div>
  </div>

  <div style="background:#16181D;border:1px solid rgba(255,255,255,.08);border-radius:18px;padding:20px">
    <div class="dk-row" style="margin-bottom:16px">
      <span style="font-size:15px;font-weight:500">Swap</span>
      <i class="ti ti-settings dk-mut" style="font-size:17px" aria-hidden="true"></i>
    </div>

    <div class="dk-fld">
      <div class="dk-row" style="margin-bottom:11px"><span class="dk-mut" style="font-size:12px">You pay</span><span class="dk-mut num" style="font-size:12px">Balance 12,480</span></div>
      <div class="dk-row">
        <span class="num" style="font-size:27px;font-weight:600;letter-spacing:-.02em;color:#fff">1,000.00</span>
        <span class="dk-pill"><span style="width:22px;height:22px;border-radius:50%;background:#2775CA;color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px">$</span><span style="font-size:14px;font-weight:500">USDC</span></span>
      </div>
    </div>

    <div style="display:flex;justify-content:center;margin:-13px 0;position:relative;z-index:1">
      <span style="width:36px;height:36px;border-radius:50%;background:#16181D;border:1px solid rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;color:#9AA4FF"><i class="ti ti-arrows-down-up" style="font-size:16px" aria-hidden="true"></i></span>
    </div>

    <div class="dk-fld">
      <div class="dk-row" style="margin-bottom:11px"><span class="dk-mut" style="font-size:12px">You receive</span><span class="dk-mut" style="font-size:12px">on Tron</span></div>
      <div class="dk-row">
        <span class="num" style="font-size:27px;font-weight:600;letter-spacing:-.02em;color:#9AA4FF">919.20</span>
        <span class="dk-pill"><span style="width:22px;height:22px;border-radius:50%;background:#EDEFF2;color:#16181D;display:flex;align-items:center;justify-content:center;font-size:11px">€</span><span style="font-size:14px;font-weight:500">EUROe</span></span>
      </div>
    </div>

    <div class="dk-row" style="margin:16px 0 5px"><span class="dk-mut num" style="font-size:13px">1 USDC ≈ 0.919 EUROe</span><span style="font-size:13px;font-weight:500;color:#9AA4FF">Fill 99.4%</span></div>
    <div class="dk-mut" style="font-size:12px;margin-bottom:16px;display:flex;align-items:center;gap:5px"><i class="ti ti-link" style="font-size:13px" aria-hidden="true"></i>Settles atomically — both legs or neither</div>

    <div class="dk-btn" role="button" aria-label="Review swap">Review swap</div>
  </div>
</div>
</div>

</div></body></html>
