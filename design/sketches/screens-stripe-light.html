<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>xln — screens · stripe light</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<style>:root{--font-sans:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;--font-serif:Georgia,serif}
body{margin:0;background:#e6e8eb;display:flex;justify-content:center;padding:28px 16px;font-family:var(--font-sans)}
.stage{width:100%;max-width:720px}
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
.sl{font-family:'Inter',var(--font-sans);color:#1A1F36}
.sl .num{font-variant-numeric:tabular-nums}
.sl-mut{color:#697386}
.sl-row{display:flex;justify-content:space-between;align-items:center}
.sl-btn{height:46px;display:flex;align-items:center;justify-content:center;border-radius:10px;background:#635BFF;color:#fff;font-size:15px;font-weight:500;cursor:pointer}
.sl-box{background:#F6F9FC;border:1px solid #E3E8EE;border-radius:12px;padding:14px 15px}
</style>
</head><body><div class="stage">

<div id="screens-stripe" class="sl" style="background:#F6F9FC;border-radius:18px;padding:20px;display:grid;grid-template-columns:repeat(auto-fit,minmax(282px,1fr));gap:16px">

  <div style="background:#fff;border:1px solid #E3E8EE;border-radius:16px;padding:20px">
    <div class="sl-row" style="margin-bottom:18px">
      <span style="font-size:15px;font-weight:500">Send</span>
      <span class="sl-mut" style="font-size:12px;display:flex;align-items:center;gap:5px"><i class="ti ti-lock" style="font-size:13px" aria-hidden="true"></i>provable</span>
    </div>

    <div class="sl-row" style="margin-bottom:20px">
      <div style="display:flex;align-items:center;gap:11px">
        <span style="width:38px;height:38px;border-radius:50%;background:#EEEDFF;color:#635BFF;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:500">G</span>
        <div><div style="font-size:15px;font-weight:500;line-height:1.2">grace</div><div class="sl-mut num" style="font-size:12px">0x9f3c…1118</div></div>
      </div>
      <i class="ti ti-chevron-right sl-mut" style="font-size:18px" aria-hidden="true"></i>
    </div>

    <div style="text-align:center;margin:4px 0 20px">
      <div class="num" style="font-size:46px;font-weight:600;letter-spacing:-.02em;line-height:1">$250.00</div>
      <div class="sl-mut" style="font-size:13px;margin-top:7px;display:inline-flex;align-items:center;gap:4px">USDC <i class="ti ti-chevron-down" style="font-size:14px" aria-hidden="true"></i></div>
    </div>

    <div style="border-top:1px solid #E3E8EE;padding-top:14px">
      <div class="sl-row" style="margin-bottom:9px"><span class="sl-mut" style="font-size:13px">Amount</span><span class="num" style="font-size:14px">$250.00</span></div>
      <div class="sl-row" style="margin-bottom:9px"><span class="sl-mut" style="font-size:13px">Network fee</span><span style="font-size:14px;color:#0E9F6E;font-weight:500">Free</span></div>
      <div class="sl-row"><span class="sl-mut" style="font-size:13px">Arrives</span><span style="font-size:14px;color:#0E9F6E;font-weight:500">Instantly</span></div>
    </div>

    <div style="margin:16px 0 18px">
      <div class="sl-row" style="margin-bottom:7px"><span class="sl-mut" style="font-size:12px">Backed by credit</span><span class="sl-mut num" style="font-size:12px">4,880 available</span></div>
      <div style="height:5px;border-radius:3px;background:#EEEDFF;overflow:hidden"><div style="width:38%;height:100%;background:#635BFF"></div></div>
    </div>

    <div class="sl-btn" role="button" aria-label="Send 250 dollars">Send $250.00</div>
  </div>

  <div style="background:#fff;border:1px solid #E3E8EE;border-radius:16px;padding:20px">
    <div class="sl-row" style="margin-bottom:16px">
      <span style="font-size:15px;font-weight:500">Swap</span>
      <i class="ti ti-settings sl-mut" style="font-size:17px" aria-hidden="true"></i>
    </div>

    <div class="sl-box">
      <div class="sl-row" style="margin-bottom:10px"><span class="sl-mut" style="font-size:12px">You pay</span><span class="sl-mut num" style="font-size:12px">Balance 12,480</span></div>
      <div class="sl-row">
        <span class="num" style="font-size:26px;font-weight:600;letter-spacing:-.01em">1,000.00</span>
        <span style="display:flex;align-items:center;gap:7px;background:#fff;border:1px solid #E3E8EE;border-radius:999px;padding:5px 11px 5px 6px"><span style="width:20px;height:20px;border-radius:50%;background:#2775CA;color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px">$</span><span style="font-size:14px;font-weight:500">USDC</span></span>
      </div>
    </div>

    <div style="display:flex;justify-content:center;margin:-13px 0;position:relative;z-index:1">
      <span style="width:34px;height:34px;border-radius:50%;background:#fff;border:1px solid #E3E8EE;display:flex;align-items:center;justify-content:center;color:#635BFF"><i class="ti ti-arrows-down-up" style="font-size:16px" aria-hidden="true"></i></span>
    </div>

    <div class="sl-box">
      <div class="sl-row" style="margin-bottom:10px"><span class="sl-mut" style="font-size:12px">You receive</span><span class="sl-mut" style="font-size:12px">on Tron</span></div>
      <div class="sl-row">
        <span class="num" style="font-size:26px;font-weight:600;letter-spacing:-.01em;color:#635BFF">919.20</span>
        <span style="display:flex;align-items:center;gap:7px;background:#fff;border:1px solid #E3E8EE;border-radius:999px;padding:5px 11px 5px 6px"><span style="width:20px;height:20px;border-radius:50%;background:#1A1F36;color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px">€</span><span style="font-size:14px;font-weight:500">EUROe</span></span>
      </div>
    </div>

    <div class="sl-row" style="margin:16px 0 4px"><span class="sl-mut num" style="font-size:13px">1 USDC ≈ 0.919 EUROe</span><span style="font-size:13px;font-weight:500;color:#635BFF">Fill 99.4%</span></div>
    <div class="sl-mut" style="font-size:12px;margin-bottom:16px;display:flex;align-items:center;gap:5px"><i class="ti ti-link" style="font-size:13px" aria-hidden="true"></i>Settles atomically — both legs or neither</div>

    <div class="sl-btn" role="button" aria-label="Review swap">Review swap</div>
  </div>
</div>

</div></body></html>
