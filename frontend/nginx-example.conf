# Example nginx config for XLN production deployment
# This is what ACTUALLY handles HTTPS in production (not vite.config.ts)

server {
    listen 443 ssl http2;
    server_name xln.finance;

    # Your production SSL certificates (nginx handles these)
    ssl_certificate /etc/letsencrypt/live/xln.finance/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/xln.finance/privkey.pem;

    # Serve static SvelteKit build
    root /var/www/xln/frontend/build;
    index index.html;

    location = /app {
        try_files /index.html =404;
        default_type text/html;
        add_header Content-Security-Policy "frame-ancestors 'self' https://xln.finance https://app.xln.finance https://custody.xln.finance https://localhost:* http://localhost:*" always;
    }

    location = /resetdb {
        default_type text/plain;
        add_header Cache-Control "no-store, max-age=0" always;
        add_header Clear-Site-Data '"*"' always;
        add_header Refresh "0;url=/app" always;
        return 200 "Resetting local data";
    }

    # SPA fallback - try .html extension for SvelteKit routes
    location / {
        try_files $uri $uri.html $uri/ /index.html;
        add_header Content-Security-Policy "frame-ancestors 'self'" always;
    }

    # Cache static assets
    location /_app/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location = /rpc {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }

    location ~ ^/rpc[2-8]$ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    location /api/tower/ {
        proxy_pass http://127.0.0.1:9100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name xln.finance;
    return 301 https://$host$request_uri;
}
