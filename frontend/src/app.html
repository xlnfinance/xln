<!doctype html>
<html
	lang="en"
	data-ui-density="comfortable"
	data-ui-radius="soft"
	data-ui-borders="subtle"
	data-ui-shadows="soft"
	data-ui-tabs="underline"
	data-ui-buttons="soft"
	data-ui-cards="filled"
	data-ui-inputs="outlined"
	data-ui-accent="normal"
	data-ui-typography="md"
>
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
		<meta name="theme-color" content="#000000" />
		<meta name="mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-title" content="xln" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

		<!-- Primary Meta Tags -->
		<title>xln - The mathematical endgame in scalability, security, and simplicity</title>
		<meta name="title" content="xln - The mathematical endgame in scalability, security, and simplicity" />
		<meta name="description" content="The internet went unicast. Now finance follows. Off-chain settlement with bounded risk and infinite scale. The first Reserve-Credit Provable Account Network (RCPAN)." />

		<!-- Open Graph / Facebook -->
		<meta property="og:type" content="website" />
		<meta property="og:url" content="https://xln.finance/" />
		<meta property="og:title" content="xln - The mathematical endgame in scalability, security, and simplicity" />
		<meta property="og:description" content="The internet went unicast. Now finance follows. Off-chain settlement with bounded risk and infinite scale." />
		<meta property="og:image" content="https://xln.finance/img/og-image.png" />
		<meta property="og:image:width" content="1200" />
		<meta property="og:image:height" content="630" />

		<!-- Twitter -->
		<meta property="twitter:card" content="summary_large_image" />
		<meta property="twitter:url" content="https://xln.finance/" />
		<meta property="twitter:title" content="xln - The mathematical endgame in scalability, security, and simplicity" />
		<meta property="twitter:description" content="The internet went unicast. Now finance follows. Off-chain settlement with bounded risk and infinite scale." />
		<meta property="twitter:image" content="https://xln.finance/img/og-image.png" />
		<meta name="twitter:site" content="@xlnfinance" />
		<meta name="twitter:creator" content="@xlnfinance" />

		<link rel="icon" type="image/x-icon" href="/favicon.ico">
		<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
		<link rel="apple-touch-icon-precomposed" sizes="180x180" href="/apple-touch-icon.png">
		<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
		<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
		<link rel="icon" type="image/png" sizes="192x192" href="/android-chrome-192x192.png">
		<link rel="icon" type="image/png" sizes="512x512" href="/android-chrome-512x512.png">
		<link rel="manifest" href="/site.webmanifest">

		<!-- Plausible Analytics -->
		<script async src="https://plausible.io/js/pa-xeU-A89j2Mpz0DGp8BnVt.js"></script>
		<script>
			window.plausible=window.plausible||function(){(plausible.q=plausible.q||[]).push(arguments)},plausible.init=plausible.init||function(i){plausible.o=i||{}};
			plausible.init()
		</script>

		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		%sveltekit.body%
		<style>
			:root {
				--theme-background: #09090b;
				--theme-bg-gradient: linear-gradient(135deg, #09090b 0%, #18181b 50%, #0c0c0e 100%);
				--theme-text-primary: #e4e4e7;
				--theme-text-secondary: #a1a1aa;
				--ui-density-scale: 1;
				--ui-control-height: 44px;
				--ui-radius-base: 12px;
				--ui-radius-large: 16px;
				--ui-radius-pill: 999px;
				--ui-border-alpha: 0.56;
				--ui-border-strong-alpha: 0.72;
				--ui-border-mix: 56%;
				--ui-border-strong-mix: 72%;
				--ui-shadow-opacity: 0.07;
				--ui-shadow-lift: 0px 10px 24px;
				--ui-accent-soft: 0.1;
				--ui-accent-border: 0.22;
				--ui-accent-soft-mix: 10%;
				--ui-accent-border-mix: 22%;
				--ui-font-scale: 1;
				--ui-card-fill-opacity: 0.94;
				--ui-card-fill-mix: 94%;
				--ui-input-fill-opacity: 0.82;
				--ui-input-fill-mix: 82%;
			}
			html, body {
				margin: 0;
				padding: 0;
				min-height: 100%;
				-webkit-overflow-scrolling: touch;
				background: var(--theme-bg-gradient, #0a0a0c);
				color: var(--theme-text-primary, #e4e4e7);
				transition: background 140ms ease, color 140ms ease;
			}
			html:not(.xln-user-mode),
			body:not(.xln-user-mode) {
				height: 100%;
				overflow: hidden;
				overscroll-behavior: none;
			}
			/* Prevent iOS elastic bounce / white flash on overscroll in dock/dev mode only */
			body:not(.xln-user-mode) {
				position: fixed;
				width: 100%;
			}
			html.xln-user-mode {
				height: auto;
				min-height: 100dvh;
				overflow-x: hidden;
				overflow-y: auto;
				overscroll-behavior-y: auto;
				background: var(--theme-bg-gradient, #0a0a0c);
			}
			body.xln-user-mode {
				min-height: 100dvh;
				overflow: visible;
				position: static;
				width: auto;
				background: transparent;
				isolation: isolate;
			}
			body.xln-user-mode::before {
				content: '';
				position: fixed;
				inset: 0;
				background: var(--theme-bg-gradient, #0a0a0c);
				pointer-events: none;
				z-index: -1;
			}
		</style>
	</body>
</html>
