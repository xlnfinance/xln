<!doctype html>
<html
	lang="en"
	data-ui-density="comfortable"
	data-ui-radius="sharp"
	data-ui-borders="subtle"
	data-ui-shadows="flat"
	data-ui-tabs="segmented"
	data-ui-buttons="soft"
	data-ui-cards="flat"
	data-ui-inputs="outlined"
	data-ui-accent="normal"
	data-ui-typography="md"
>
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
		<meta name="theme-color" content="#000000" />
		<meta name="mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-title" content="xln" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

		<!-- Primary Meta Tags -->
		<title>xln - The mathematical endgame in scalability, security, and simplicity</title>
		<meta name="title" content="xln - The mathematical endgame in scalability, security, and simplicity" />
		<meta name="description" content="The internet went unicast. Now finance follows. Off-chain settlement with bounded risk and infinite scale. The first Reserve-Credit Provable Account Network (RCPAN)." />

		<!-- Open Graph / Facebook -->
		<meta property="og:type" content="website" />
		<meta property="og:url" content="https://xln.finance/" />
		<meta property="og:title" content="xln - The mathematical endgame in scalability, security, and simplicity" />
		<meta property="og:description" content="The internet went unicast. Now finance follows. Off-chain settlement with bounded risk and infinite scale." />
		<meta property="og:image" content="https://xln.finance/img/og-image.png" />
		<meta property="og:image:width" content="1200" />
		<meta property="og:image:height" content="630" />

		<!-- Twitter -->
		<meta property="twitter:card" content="summary_large_image" />
		<meta property="twitter:url" content="https://xln.finance/" />
		<meta property="twitter:title" content="xln - The mathematical endgame in scalability, security, and simplicity" />
		<meta property="twitter:description" content="The internet went unicast. Now finance follows. Off-chain settlement with bounded risk and infinite scale." />
		<meta property="twitter:image" content="https://xln.finance/img/og-image.png" />
		<meta name="twitter:site" content="@xlnfinance" />
		<meta name="twitter:creator" content="@xlnfinance" />

		<link rel="icon" type="image/x-icon" href="/favicon.ico">
		<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
		<link rel="apple-touch-icon-precomposed" sizes="180x180" href="/apple-touch-icon.png">
		<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
		<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
		<link rel="icon" type="image/png" sizes="192x192" href="/android-chrome-192x192.png">
		<link rel="icon" type="image/png" sizes="512x512" href="/android-chrome-512x512.png">
		<link rel="manifest" href="/site.webmanifest">

		<!-- Plausible Analytics -->
		<script async src="https://plausible.io/js/pa-xeU-A89j2Mpz0DGp8BnVt.js"></script>
		<script>
			window.plausible=window.plausible||function(){(plausible.q=plausible.q||[]).push(arguments)},plausible.init=plausible.init||function(i){plausible.o=i||{}};
			plausible.init()
		</script>
		<script>
			(function() {
				var isAppRoute = window.location.pathname === '/app' || window.location.pathname.startsWith('/app/');
				if (isAppRoute) {
					document.documentElement.classList.add('xln-user-mode');
					document.documentElement.setAttribute('data-xln-route-mode', 'app');
				} else {
					document.documentElement.setAttribute('data-xln-route-mode', 'default');
				}
			})();
		</script>

		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
		<style>
			:root {
				--theme-background: #09090b;
				--theme-bg-gradient: linear-gradient(135deg, #09090b 0%, #18181b 50%, #0c0c0e 100%);
				--theme-text-primary: #e4e4e7;
				--theme-text-secondary: #a1a1aa;
				--ui-density-scale: 1;
				--ui-control-height: 44px;
				--ui-radius-base: 6px;
				--ui-radius-large: 10px;
				--ui-radius-pill: 8px;
				--ui-border-alpha: 0.56;
				--ui-border-strong-alpha: 0.72;
				--ui-border-mix: 56%;
				--ui-border-strong-mix: 72%;
				--ui-shadow-opacity: 0;
				--ui-shadow-lift: 0px 0px 0px;
				--ui-accent-soft: 0.1;
				--ui-accent-border: 0.22;
				--ui-accent-soft-mix: 10%;
				--ui-accent-border-mix: 22%;
				--ui-font-scale: 1;
				--ui-card-fill-opacity: 0.78;
				--ui-card-fill-mix: 78%;
				--ui-input-fill-opacity: 0.82;
				--ui-input-fill-mix: 82%;
			}
			html, body {
				margin: 0;
				padding: 0;
				min-height: 100%;
				-webkit-overflow-scrolling: touch;
				overflow-x: hidden;
				overflow-y: auto;
				overscroll-behavior-y: auto;
				background-color: var(--theme-background, #0a0a0c);
				background-image: var(--theme-bg-gradient, linear-gradient(135deg, #09090b 0%, #18181b 50%, #0c0c0e 100%));
				color: var(--theme-text-primary, #e4e4e7);
				transition: background 140ms ease, color 140ms ease;
			}
			html.xln-user-mode,
			html[data-xln-route-mode='app'] {
				height: auto;
				min-height: 100dvh;
				background-color: var(--theme-background, #0a0a0c);
				background-image: var(--theme-bg-gradient, linear-gradient(135deg, #09090b 0%, #18181b 50%, #0c0c0e 100%));
			}
			body.xln-user-mode,
			html[data-xln-route-mode='app'] body {
				min-height: 100dvh;
				position: static;
				width: auto;
				background-color: var(--theme-background, #0a0a0c);
				background-image: var(--theme-bg-gradient, linear-gradient(135deg, #09090b 0%, #18181b 50%, #0c0c0e 100%));
			}
		</style>
	</body>
</html>
