services:
  redis-db:
    image: redis:alpine
    restart: always
    command: redis-server
    volumes:
      - redis_data:/data

  db-init:
    image: postgres:17
    user: root
    volumes:
      - db_data:/var/lib/postgresql/data
    entrypoint:
      - sh
      - -c
      - |
        chown -R 2000:2000 /var/lib/postgresql/data

  db:
    image: postgres:17
    user: "2000:2000"
    shm_size: 256m
    restart: always
    depends_on:
      db-init:
        condition: service_completed_successfully
    command: postgres -c 'max_connections=200' -c 'client_connection_check_interval=60000'
    environment:
      POSTGRES_DB: ${BLOCKSCOUT_DB_NAME}
      POSTGRES_USER: ${BLOCKSCOUT_DB_USER}
      POSTGRES_PASSWORD: ${BLOCKSCOUT_DB_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${BLOCKSCOUT_DB_USER} -d ${BLOCKSCOUT_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    image: ghcr.io/blockscout/blockscout:${BLOCKSCOUT_BACKEND_TAG}
    pull_policy: always
    restart: always
    stop_grace_period: 5m
    depends_on:
      db:
        condition: service_healthy
      redis-db:
        condition: service_started
    command: sh -c "bin/blockscout eval \"Elixir.Explorer.ReleaseTasks.create_and_migrate()\" && bin/blockscout start"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DATABASE_URL: postgresql://${BLOCKSCOUT_DB_USER}:${BLOCKSCOUT_DB_PASSWORD}@db:5432/${BLOCKSCOUT_DB_NAME}
      SECRET_KEY_BASE: ${BLOCKSCOUT_SECRET_KEY_BASE}
      PORT: "4000"
      ETHEREUM_JSONRPC_VARIANT: anvil
      ETHEREUM_JSONRPC_TRANSPORT: http
      ETHEREUM_JSONRPC_HTTP_URL: ${BLOCKSCOUT_RPC_HTTP_URL}
      ETHEREUM_JSONRPC_TRACE_URL: ${BLOCKSCOUT_RPC_TRACE_URL}
      ETHEREUM_JSONRPC_WS_URL: ${BLOCKSCOUT_RPC_WS_URL}
      ETHEREUM_JSONRPC_DISABLE_ARCHIVE_BALANCES: "false"
      CHAIN_ID: ${BLOCKSCOUT_CHAIN_ID}
      COIN: ${BLOCKSCOUT_NATIVE_SYMBOL}
      COIN_NAME: ${BLOCKSCOUT_NATIVE_NAME}
      BLOCKSCOUT_HOST: ${BLOCKSCOUT_DOMAIN}
      BLOCKSCOUT_PROTOCOL: https
      DISABLE_MARKET: "true"
      DISABLE_FILE_LOGGING: "false"
      ADMIN_PANEL_ENABLED: "false"
      API_V1_READ_METHODS_DISABLED: "false"
      API_V1_WRITE_METHODS_DISABLED: "false"
      INDEXER_DISABLE_INTERNAL_TRANSACTIONS_FETCHER: "true"
      INDEXER_DISABLE_PENDING_TRANSACTIONS_FETCHER: "true"
      ECTO_USE_SSL: "false"
    volumes:
      - backend_logs:/app/logs
      - backend_dets:/app/dets

  frontend:
    image: ghcr.io/blockscout/frontend:${BLOCKSCOUT_FRONTEND_TAG}
    pull_policy: always
    platform: linux/amd64
    restart: always
    depends_on:
      backend:
        condition: service_started
    environment:
      NEXT_PUBLIC_API_HOST: ${BLOCKSCOUT_DOMAIN}
      NEXT_PUBLIC_API_PROTOCOL: https
      NEXT_PUBLIC_API_BASE_PATH: /
      NEXT_PUBLIC_APP_HOST: ${BLOCKSCOUT_DOMAIN}
      NEXT_PUBLIC_APP_PROTOCOL: https
      NEXT_PUBLIC_NETWORK_NAME: ${BLOCKSCOUT_NETWORK_NAME}
      NEXT_PUBLIC_NETWORK_SHORT_NAME: ${BLOCKSCOUT_NETWORK_SHORT_NAME}
      NEXT_PUBLIC_NETWORK_ID: ${BLOCKSCOUT_CHAIN_ID}
      NEXT_PUBLIC_NETWORK_RPC_URL: ${BLOCKSCOUT_PUBLIC_RPC_URL}
      NEXT_PUBLIC_NETWORK_CURRENCY_NAME: ${BLOCKSCOUT_NATIVE_NAME}
      NEXT_PUBLIC_NETWORK_CURRENCY_SYMBOL: ${BLOCKSCOUT_NATIVE_SYMBOL}
      NEXT_PUBLIC_NETWORK_CURRENCY_DECIMALS: ${BLOCKSCOUT_NATIVE_DECIMALS}
      NEXT_PUBLIC_IS_TESTNET: "true"
      NEXT_PUBLIC_STATS_API_HOST: ""
      NEXT_PUBLIC_VISUALIZE_API_HOST: ""
      NEXT_PUBLIC_HOMEPAGE_CHARTS: "['daily_txs']"
      NEXT_PUBLIC_API_WEBSOCKET_PROTOCOL: wss

  proxy:
    image: nginx:alpine
    restart: always
    depends_on:
      backend:
        condition: service_started
      frontend:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      BACK_PROXY_PASS: http://backend:4000
      FRONT_PROXY_PASS: http://frontend:3000
    ports:
      - "127.0.0.1:${BLOCKSCOUT_PROXY_PORT}:80"
    volumes:
      - ./proxy/explorer.conf.template:/etc/nginx/templates/default.conf.template:ro

volumes:
  db_data:
  redis_data:
  backend_logs:
  backend_dets:
